name: Reusable Audit

on:
  workflow_call:
    inputs:
      working_directory:
        type: string
        default: "packages/core"
        description: Directory to audit
      tool_ref:
        type: string
        default: "main"
        description: Ref of nirapod-audit CLI sources to clone for execution

jobs:
  audit:
    name: nirapod-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Clone nirapod-audit
        run: |
          mkdir -p $HOME/.nirapod/tools
          git clone https://github.com/nirapod-labs/nirapod-audit.git $HOME/.nirapod/tools/nirapod-audit
          cd $HOME/.nirapod/tools/nirapod-audit
          git fetch origin --force
          git checkout -f "${{ inputs.tool_ref }}"
          bun install --frozen-lockfile

      - name: Run audit
        run: |
          mkdir -p ${{ inputs.working_directory }}
          cd ${{ inputs.working_directory }}
          bun "$HOME/.nirapod/tools/nirapod-audit/apps/cli/src/index.tsx" audit --output sarif > audit-report.json || true
          bun "$HOME/.nirapod/tools/nirapod-audit/apps/cli/src/index.tsx" audit --output markdown > /dev/null || true
          LATEST_MD="$(find .nirapod/audit -maxdepth 1 -type f -name 'nirapod-report-*.md' | sort | tail -n 1)"
          if [ -n "$LATEST_MD" ]; then
            cp "$LATEST_MD" audit-report.md
          else
            : > audit-report.md
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: |
            ${{ inputs.working_directory }}/audit-report.json
            ${{ inputs.working_directory }}/audit-report.md
          retention-days: 30

      - name: Post audit report to pull request
        if: always()
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            const reportPath = process.cwd() + '/${{ inputs.working_directory }}/audit-report.md';
            const prNumber = context.payload.pull_request?.number;
            const marker = '<!-- nirapod-audit-report -->';

            if (!prNumber) {
              core.info('No pull request context detected; skipping PR comment.');
              return 'no-pr';
            }

            if (!fs.existsSync(reportPath)) {
              core.warning('audit-report.md not found; skipping PR comment.');
              return 'no-report';
            }

            const reportBody = fs.readFileSync(reportPath, 'utf8').trim();
            const body = [
              marker,
              '',
              '## Nirapod Audit Report',
              '',
              reportBody,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
        continue-on-error: true

      - name: Post status check
        if: always()
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            const path = process.cwd() + '/${{ inputs.working_directory }}/audit-report.json';
            let status = 'success';
            let summary = 'Audit passed';

            if (fs.existsSync(path)) {
              const report = JSON.parse(fs.readFileSync(path, 'utf8'));
              if (report.summary?.errors > 0) {
                status = 'failure';
                summary = report.summary.errors + ' errors found';
              } else if (report.summary?.warnings > 0) {
                summary = report.summary.warnings + ' warnings';
              }
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              target_url: context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
              state: status,
              description: summary,
              context: 'nirapod-audit'
            });
        continue-on-error: true
