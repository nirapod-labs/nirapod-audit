name: Audit (Reusable)

on:
  workflow_call:
    inputs:
      target-path:
        description: "The directory to audit"
        required: false
        default: "."
        type: string
      config-path:
        description: "Path to an optional nirapod-audit.toml"
        required: false
        type: string
      fail-on-error:
        description: "Fail the workflow if audit errors are found"
        required: false
        default: true
        type: boolean
    secrets:
      NIRAPOD_AUDIT_TOKEN:
        description: "PAT to access the nirapod-audit repo if it is private"
        required: false

jobs:
  audit:
    name: Nirapod Security & Compliance Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    
    steps:
      - name: Check out caller repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check out audit tool
        uses: actions/checkout@v4
        with:
          repository: nirapod-labs/nirapod-audit
          path: .nirapod-audit-tool
          token: ${{ secrets.NIRAPOD_AUDIT_TOKEN || github.token }}
          ref: main

      - name: Install audit tool dependencies
        shell: bash
        run: |
          cd .nirapod-audit-tool
          bun install --frozen-lockfile

      - name: Run Audit (Markdown)
        id: run-markdown
        shell: bash
        run: |
          # Resolve target path relative to calling repo root
          TARGET_ABS=$(realpath ${{ inputs.target-path }})
          
          # Navigate into tool directory to access its source and node_modules
          cd .nirapod-audit-tool
          
          # Construct command
          CMD="bun run apps/cli/src/index.tsx audit $TARGET_ABS --output markdown"
          if [ -n "${{ inputs.config-path }}" ]; then
            CMD="$CMD --config $(realpath ../${{ inputs.config-path }})"
          fi
          
          # Execute
          eval "$CMD"
        continue-on-error: true

      - name: Run Audit (SARIF)
        id: run-sarif
        shell: bash
        run: |
          TARGET_ABS=$(realpath ${{ inputs.target-path }})
          cd .nirapod-audit-tool
          
          # Construct command
          CMD="bun run apps/cli/src/index.tsx audit $TARGET_ABS --output sarif"
          if [ -n "${{ inputs.config-path }}" ]; then
            CMD="$CMD --config $(realpath ../${{ inputs.config-path }})"
          fi
          
          # Execute and redirect to caller root
          eval "$CMD" > ../audit.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: audit.sarif
        continue-on-error: true

      - name: Find Markdown Report
        id: find-report
        shell: bash
        run: |
          # Search for report in .nirapod/audit/ under target root
          REPORT=$(find . -name "nirapod-report-*.md" | head -n 1)
          if [ -n "$REPORT" ]; then
            echo "report_path=$REPORT" >> $GITHUB_OUTPUT
            echo "Found report: $REPORT"
          fi

      - name: Post PR Comment
        if: github.event_name == 'pull_request' && steps.find-report.outputs.report_path != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: ${{ steps.find-report.outputs.report_path }}
        continue-on-error: true

      - name: Upload Report Artifact
        if: always() && steps.find-report.outputs.report_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: nirapod-audit-report
          path: ./.nirapod/audit/

      - name: Check Exit Status
        if: inputs.fail-on-error == true
        shell: bash
        run: |
          if [ "${{ steps.run-markdown.outcome }}" == "failure" ]; then
            echo "::error::Nirapod Audit found errors in the codebase."
            exit 1
          fi
