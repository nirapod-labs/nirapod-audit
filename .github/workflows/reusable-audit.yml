name: Reusable Audit

on:
  workflow_call:
    inputs:
      working_directory:
        type: string
        default: "."
        description: Directory to audit
    
    secrets:
      GITHUB_TOKEN:
        required: false

jobs:
  audit:
    name: nirapod-audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run audit
        working-directory: ${{ inputs.working_directory }}
        run: |
          bun run ../nirapod-audit/apps/cli/src/index.tsx audit ./packages/core --output sarif > audit-report.json || true
          bun run ../nirapod-audit/apps/cli/src/index.tsx audit ./packages/core --output markdown > audit-report.md || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: |
            ${{ inputs.working_directory }}/audit-report.json
            ${{ inputs.working_directory }}/audit-report.md
          retention-days: 30

      - name: Post report as comment
        if: always()
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            const path = '${{ inputs.working_directory }}/audit-report.md';
            if (fs.existsSync(path)) {
              const report = fs.readFileSync(path, 'utf8');
              const body = `## 📋 Audit Report\n\n${report}\n\n*Generated by nirapod-audit reusable workflow*`;
              github.rest.issues.createComment({
                issue_number: context.issue?.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
        continue-on-error: true

      - name: Post status check
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ inputs.working_directory }}/audit-report.json';
            let status = 'success';
            let summary = 'Audit passed';
            
            if (fs.existsSync(path)) {
              const report = JSON.parse(fs.readFileSync(path, 'utf8'));
              if (report.summary?.errors > 0) {
                status = 'failure';
                summary = `${report.summary.errors} errors found`;
              } else if (report.summary?.warnings > 0) {
                summary = `${report.summary.warnings} warnings`;
              }
            }
            
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              state: status,
              description: summary,
              context: 'nirapod-audit'
            });
        continue-on-error: true